[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"                                          # must be present but will be ignored
script = "script"
ast = true
build_info = true
extra_output = ["storageLayout"]
ffi = true
fs_permissions = [{ access = "read", path = "./out" }]
# via_ir = true
# optimizer = true
# optimizer_runs = 200

[profile.coverage]
exclude = [
    "test/**",   # ignore every file under test/
    "script/**", # ignore every file under script/
]


# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
